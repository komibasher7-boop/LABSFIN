<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabsFin.com | Premium FinTech Acquisition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #e5e5e5;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        .serif-title {
            font-family: 'Playfair Display', serif;
        }
        .luxury-gradient {
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
        }
        .gold-text {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            opacity: .03;
            z-index: 999;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)"/></svg>');
        }
        .reveal {
            animation: reveal 1.2s cubic-bezier(0.77, 0, 0.175, 1) forwards;
        }
        @keyframes reveal {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="luxury-gradient min-h-screen flex flex-col justify-between">
    <div class="noise"></div>

    <!-- Top Status -->
    <nav class="relative z-10 flex justify-between items-center px-8 py-8 max-w-7xl mx-auto w-full">
        <div class="text-[10px] tracking-[0.5em] font-light text-neutral-600 uppercase">
            Asset: LabsFin.com
        </div>
        <div class="flex items-center gap-3">
            <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
            <span class="text-[10px] tracking-widest uppercase text-emerald-500 font-bold">Verified Available</span>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="relative z-10 flex-grow flex items-center justify-center">
        <div class="text-center px-6">
            <div class="reveal mb-4">
                <span class="text-neutral-500 text-xs tracking-[0.4em] uppercase">Premium Digital Real Estate</span>
            </div>
            
            <div class="reveal" style="animation-delay: 0.1s;">
                <h1 class="serif-title text-7xl md:text-9xl text-white leading-tight mb-8">
                    Labs<span class="gold-text italic">Fin</span><span class="text-neutral-800">.com</span>
                </h1>
            </div>

            <div class="reveal" style="animation-delay: 0.2s;">
                <p class="max-w-xl mx-auto text-lg text-neutral-400 font-light mb-12">
                    The ultimate identity for high-end <span class="text-white">FinTech</span> and <span class="text-white">Financial Labs</span>.
                </p>
            </div>

            <div class="reveal" style="animation-delay: 0.3s;">
                <a href="https://www.afternic.com/domains/Labsfin.com" target="_blank" class="inline-block group relative px-16 py-6 bg-white text-black font-bold text-sm tracking-widest overflow-hidden transition-all duration-300 hover:bg-neutral-200">
                    ACQUIRE DOMAIN
                </a>
            </div>
        </div>
    </main>

    <!-- Essential Stats Only -->
    <footer class="relative z-10 w-full py-12 border-t border-neutral-900/50">
        <div class="max-w-4xl mx-auto px-6 grid grid-cols-2 md:grid-cols-4 gap-8 text-center">
            <div>
                <p class="text-[10px] text-neutral-600 uppercase tracking-tighter mb-1">Extension</p>
                <p class="text-xs font-bold text-neutral-300">.COM</p>
            </div>
            <div>
                <p class="text-[10px] text-neutral-600 uppercase tracking-tighter mb-1">Type</p>
                <p class="text-xs font-bold text-neutral-300">Premium FinTech</p>
            </div>
            <div>
                <p class="text-[10px] text-neutral-600 uppercase tracking-tighter mb-1">Length</p>
                <p class="text-xs font-bold text-neutral-300">7 Characters</p>
            </div>
            <div>
                <p class="text-[10px] text-neutral-600 uppercase tracking-tighter mb-1">Transfer</p>
                <p class="text-xs font-bold text-neutral-300">Instant / Secure</p>
            </div>
        </div>
        
        <div class="mt-12 text-[9px] text-neutral-800 tracking-[0.5em] uppercase text-center">
            Secure Transaction via Escrow | LabsFin.com
        </div>
    </footer>
</body>
</html>
